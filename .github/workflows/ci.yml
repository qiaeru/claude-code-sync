name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Lint, type-check & test (Python ${{ matrix.python-version }} on ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13", "3.14"]
        # One macOS job backs the README's macOS support claim (Tk pickers,
        # path handling) without tripling the matrix.
        include:
          - os: macos-latest
            python-version: "3.14"

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Type-check (mypy)
        run: mypy

      - name: Test (pytest + coverage)
        run: pytest -q --cov --cov-report=term-missing
